<div class="min-h-screen bg-gradient-to-br from-blue-600 to-blue-800 flex items-center justify-center p-4">
  <div class="bg-white rounded-lg shadow-2xl p-8 w-full max-w-md">
    <!-- Logo/Titre -->
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-blue-600 mb-2">Time Sensei</h1>
      <p class="text-gray-600 text-sm">Révisez les caractères japonais efficacement</p>
    </div>

    <!-- Formulaire de connexion -->
    <form (ngSubmit)="onLogin()" class="space-y-4">
      <!-- Champ Nom d'utilisateur -->
      <div>
        <label for="username" class="block text-sm font-medium text-gray-700 mb-1">
          Nom d'utilisateur
        </label>
        <input
          type="text"
          id="username"
          [(ngModel)]="username"
          name="username"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
          placeholder="Entrez votre nom d'utilisateur"
          [disabled]="isLoading()"
        />
      </div>

      <!-- Champ Mot de passe -->
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
          Mot de passe
        </label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
          placeholder="Entrez votre mot de passe"
          [disabled]="isLoading()"
        />
      </div>

      <!-- Message d'erreur -->
      <div *ngIf="error()" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm">
        {{ error() }}
      </div>

      <!-- Boutons -->
      <div class="space-y-2 pt-2">
        <button
          type="submit"
          [disabled]="isLoading()"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed"
        >
          {{ isLoading() ? 'Connexion en cours...' : 'Se connecter' }}
        </button>

        <button
          type="button"
          (click)="onDemoLogin()"
          [disabled]="isLoading()"
          class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed"
        >
          Accès Démo
        </button>
      </div>
    </form>

    <!-- Info supplémentaire -->
    <div class="mt-6 pt-6 border-t border-gray-200">
      <p class="text-xs text-gray-500 text-center">
        Note: Cette application utilise actuellement une connexion simulée.<br />
        L'intégration au backend sera faite ultérieurement.
      </p>
    </div>
  </div>
</div>
